name: build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  workflow_dispatch:

jobs:
  msvc:
    name: MSVC x64 (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset msvc-x64

      - name: Build
        run: cmake --build --preset msvc-x64

      - uses: actions/upload-artifact@v4
        with:
          name: arcdps_legacy_loader-msvc-x64
          path: |
            build/msvc-x64/RelWithDebInfo/arcdps_legacy_loader.dll
            build/msvc-x64/RelWithDebInfo/arcdps_legacy_loader.pdb
          if-no-files-found: error

  mingw:
    name: mingw-w64 x64 (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64 ninja-build
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Configure
        run: cmake --preset mingw-x64

      - name: Build
        run: cmake --build --preset mingw-x64

      - uses: actions/upload-artifact@v4
        with:
          name: arcdps_legacy_loader-mingw-x64
          path: build/mingw-x64/arcdps_legacy_loader.dll
          if-no-files-found: error

  sign-and-release:
    name: Sign and Release
    runs-on: windows-latest
    needs: msvc
    environment:
      name: release
      deployment: false
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download MSVC build
        uses: actions/download-artifact@v4
        with:
          name: arcdps_legacy_loader-msvc-x64

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign with Trusted Signing
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: https://weu.codesigning.azure.net/
          trusted-signing-account-name: jsc-trustedsigning
          certificate-profile-name: public-trust
          files: ${{ github.workspace }}\arcdps_legacy_loader.dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Upload signed build
        uses: actions/upload-artifact@v4
        with:
          name: arcdps_legacy_loader-msvc-x64-signed
          path: |
            arcdps_legacy_loader.dll
            arcdps_legacy_loader.pdb

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            arcdps_legacy_loader.dll
            arcdps_legacy_loader.pdb
